<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOODIES | MANIFEST DEPLOYMENT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">THE EGYPTIAN KING™</a>
        <div class="nav-links">
            <a href="index.html">Hub</a>
            <a href="tshirts.html">T-Shirts</a>
            <a href="hoodies.html" class="active">Hoodies</a>
            <a href="zippers.html">Zippers</a>
        </div>
        <button class="cart-icon-btn" onclick="window.location.href='checkout.html'">

                    <span class="product-name">"Habib Albi Magazine" Grey Hoodie</span>
                    <span class="product-price">EGP 950.00</span>

                <button class="add-to-cart-btn" onclick="addProductToCart('hd-01', '\"Habib Albi Magazine\" Grey Hoodie', 950, 'https://i.postimg.cc/rw0MS0qm/Capture-3.jpg', 'Heavyweight Drop')">Inject Into Cart</button>
