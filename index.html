<script>
    // 1. Completely blocks right-click context menu on the storefront
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 2. Completely traps system keys to stop copycats opening DevTools
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false; // Blocks F12 key
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Blocks Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Blocks Ctrl+Shift+C
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Blocks Ctrl+Shift+J
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Blocks Ctrl+U (View Source)
    }
</script>
