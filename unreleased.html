<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASRY CORESYS // UNRELEASED VAULT</title>
    <style>
        /* Base Reset & Cyber Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* Scanline Overlay Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* Top Navigation / Terminal Status */
        header {
            width: 100%;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .status-tag {
            color: #d1ff27; /* Neon Green */
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .exit-btn {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
            border: 1px solid #333;
            padding: 8px 16px;
        }

        .exit-btn:hover {
            color: #ff4444;
            border-color: #ff4444;
        }

        /* Title Area */
        .vault-title-container {
            max-width: 1200px;
            margin: 60px auto 40px auto;
            padding: 0 20px;
        }

        .vault-title-container h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .vault-title-container p {
            color: #666;
            font-size: 0.9rem;
        }

        /* Grid Container */
        .product-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        /* Product Card Layout */
        .product-card {
            background: #111;
            border: 1px solid #222;
            padding: 15px;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .product-card:hover {
            border-color: #d1ff27;
            transform: translateY(-5px);
        }

        /* 3:4 Aspect Ratio Container for Streetwear Blanks */
        .image-container {
            width: 100%;
            aspect-ratio: 3 / 4;
            background-color: #1a1a1a;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%);
            transition: filter 0.3s ease;
        }

        .product-card:hover .image-container img {
            filter: grayscale(0%);
        }

        /* Exclusive Floating Ribbon */
        .badge {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #d1ff27;
            color: #000;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            text-transform: uppercase;
            z-index: 10;
        }

        /* Product Specs Text */
        .product-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .product-meta {
            color: #666;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .product-price {
            color: #d1ff27;
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Buy / Secure Action Trigger */
        .secure-btn {
            width: 100%;
            background: transparent;
            color: #ffffff;
            border: 1px solid #333;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secure-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        /* Responsive Tweaks */
        @media (max-width: 600px) {
            .vault-title-container h1 { font-size: 1.8rem; }
            header { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="status-tag">// UPLINK_SECURE: ACTIVE</div>
        <a href="https://2elmalek2elmasry-sketch.github.io/The-Egyptian-King/index.html" class="exit-btn">DISCONNECT</a>
    </header>

    <div class="vault-title-container">
        <h1>THE ARCHIVE VAULT</h1>
        <p>RESTRICTED PIPELINE // CONFIDENTIAL ACCESS GRANTED</p>
    </div>

    <main class="product-grid">
           <div class="product-card">
                <div class="img-holder">
                    <img src="https://i.postimg.cc/QC6Sy7Bq/Untitled-design-(15).png" alt="EID MUBARAK HOODIE (UNRELEASED)">
                </div>
                <div class="product-info">
                    <span class="category-tag">Collection: Dynasty</span>
                    <div class="details">
                        <span class="product-name">EID MUBARAK HOODIE (UNRELEASED)</span>
                        <span class="price">EGP 950</span>
                    </div>
                    <button class="buy-button" 
                        data-product-name="EID MUBARAK HOODIE (UNRELEASED)" 
                        data-product-price="EGP 950" 
                        data-product-image="https://i.postimg.cc/QC6Sy7Bq/Untitled-design-(15).png">Quick Buy</button>
                </div>
            </div>

            </main>
<script>
        let currentProduct = {};

        function openModal(name, price, image) {
            currentProduct = { name, price, image };
            document.getElementById('modal-product-name').innerText = name;
            document.getElementById('modal-product-price').innerText = price;
            document.getElementById('modal-product-image').src = image;
            document.getElementById('checkout-modal').style.display = 'flex';
            showStep(1);
        }

        function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }

        function showStep(step) {
            document.getElementById('step-1-summary').style.display = step === 1 ? 'block' : 'none';
            document.getElementById('step-2-shipping').style.display = step === 2 ? 'block' : 'none';
            document.getElementById('step-3-confirmation').style.display = step === 3 ? 'block' : 'none';
        }

        function nextStep(step) { showStep(step); }

        function handleCheckout() {
            const name = document.getElementById('cust-name').value;
            const email = document.getElementById('cust-email').value;
            const phone = document.getElementById('cust-phone').value;
            const size = document.querySelector('input[name="size"]:checked')?.value;

            if(!name || !email || !phone || !size) {
                alert("Please complete all fields and select a size.");
                return;
            }

            const body = `Order Details:\nProduct: ${currentProduct.name}\nSize: ${size}\nPrice: ${currentProduct.price}\n\nCustomer:\nName: ${name}\nPhone: ${phone}\nEmail: ${email}`;
            window.location.href = `mailto:2el.malek.2el.masry@gmail.com?subject=Order: ${currentProduct.name}&body=${encodeURIComponent(body)}`;

            setTimeout(() => {
                window.open('https://www.paypal.me/OmarGlelah1', '_blank');
                showStep(3);
            }, 1000);
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.buy-button');
            if (btn && btn.dataset.productName) {
                openModal(btn.dataset.productName, btn.dataset.productPrice, btn.dataset.productImage);
            }
        });
    </script>
</body>
</html>
