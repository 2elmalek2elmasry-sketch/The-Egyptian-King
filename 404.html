<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // LINK TERMINATED | THE EGYPTIAN KING</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }
        .error-frame {
            border: 1px solid #222;
            padding: 40px;
            background: #111;
            border-radius: 10px;
            max-width: 500px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .error-code {
            font-size: 5rem;
            font-weight: 900;
            color: #d1ff27;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-msg {
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #aaa;
        }
        .terminal-log {
            font-family: monospace;
            background: #000;
            padding: 15px;
            border-radius: 5px;
            font-size: 0.85rem;
            color: #ff4444;
            text-align: left;
            margin-bottom: 30px;
            border-left: 3px solid #ff4444;
        }
        .return-btn {
            display: inline-block;
            background: #d1ff27;
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 50px;
            transition: transform 0.3s ease;
        }
        .return-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body class="error-body">

    <div class="error-frame">
        <div class="error-code">404</div>
        <div class="error-msg">SYSTEM ERROR: Page Not Found</div>
        
        <div class="terminal-log">
            > EXECUTING SEARCH...<br>
            > ERROR: COORD_NOT_FOUND<br>
            > STATUS: LINK TERMINATED.
        </div>

        <a href="index.html" class="return-btn">Return to Terminal</a>
    </div>

</body>
</html>
