<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EGYPTIAN KING — Shop Collection</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@800;900&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050508;
            --card-bg: rgba(18, 18, 24, 0.75);
            --border-glow: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --accent-primary: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
        }

        body[data-theme="neon"] {
            --bg: #090014;
            --card-bg: rgba(24, 9, 43, 0.8);
            --border-glow: rgba(236, 72, 153, 0.4);
            --accent-primary: #ec4899;
            --accent-glow: rgba(236, 72, 153, 0.6);
        }

        body[data-theme="ai"] {
            --bg: #030712;
            --card-bg: rgba(15, 23, 42, 0.8);
            --border-glow: rgba(56, 189, 248, 0.35);
            --accent-primary: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.5);
        }

        body[data-theme="royalty"] {
            --bg: #0a0802;
            --card-bg: rgba(28, 23, 13, 0.85);
            --border-glow: rgba(234, 179, 8, 0.35);
            --accent-primary: #eab308;
            --accent-glow: rgba(234, 179, 8, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        header {
            background: rgba(5, 5, 8, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glow);
            padding: 1.25rem 4rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; color: #fff; text-decoration: none; text-transform: uppercase; }
        nav ul { display: flex; list-style: none; gap: 2.5rem; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        nav a:hover, nav a.active { color: #fff; }

        .header-actions { display: flex; align-items: center; gap: 1rem; }

        .btn-auth {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glow);
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-auth:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

        .btn-bag {
            background: transparent;
            border: 1px solid var(--border-glow);
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1.5px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-bag:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

        .container { max-width: 1300px; margin: 3rem auto 6rem; padding: 0 2rem; width: 100%; }
        .page-header { border-bottom: 1px solid var(--border-glow); padding-bottom: 1.5rem; margin-bottom: 3rem; }
        .page-title { font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: var(--accent-primary);
        }

        .product-img-box { width: 100%; height: 360px; background: #111; overflow: hidden; }
        .product-img-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .product-card:hover .product-img-box img { transform: scale(1.06); }

        .product-details { padding: 1.5rem; }
        .product-name { font-size: 0.95rem; font-weight: 800; letter-spacing: 1px; margin-bottom: 0.5rem; text-transform: uppercase; }
        .product-price { font-size: 1.1rem; font-weight: 700; color: var(--accent-primary); margin-bottom: 1.2rem; }

        .btn-add {
            width: 100%;
            background: var(--accent-primary);
            color: #000;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-add:active { transform: scale(0.96); }

        /* AUTH MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .auth-card h2 { font-family: 'Cinzel', serif; font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
        .auth-card p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; }

        .btn-google {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .btn-google:hover { background: #e2e2e2; transform: translateY(-2px); }

        .btn-signout {
            width: 100%;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
        }

        .btn-signout:hover { background: rgba(239, 68, 68, 0.3); }

        .btn-close-modal {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--accent-primary);
            margin: 0 auto 1rem;
            display: block;
        }

        /* CUSTOM WEB TOAST NOTIFICATION */
        .toast-notification {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(18, 18, 24, 0.95);
            border: 1px solid var(--accent-primary);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(15px);
        }

        .toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        footer { background: rgba(5, 5, 8, 0.95); border-top: 1px solid var(--border-glow); padding: 4rem 2rem 2rem; text-align: center; margin-top: auto; }
        .copyright { color: #555; font-size: 0.8rem; margin-top: 1.5rem; }
    </style>
</head>
<body>

    <!-- CUSTOM TOAST -->
    <div id="toast" class="toast-notification">
        <span>🛒</span> <span id="toast-msg">ADDED TO BAG</span>
    </div>

    <!-- AUTH MODAL -->
    <div id="auth-modal" class="modal-overlay">
        <div class="auth-card">
            <button class="btn-close-modal" id="close-modal-btn">✕</button>
            <div id="auth-unauthenticated">
                <h2>AUTHENTICATION</h2>
                <p>Sign in to link your order history and access exclusive drops.</p>
                <button class="btn-google" id="btn-google-login">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
                    Continue with Google
                </button>
            </div>
            <div id="auth-authenticated" style="display: none;">
                <img id="user-photo" class="user-avatar" src="" alt="User Avatar">
                <h2 id="user-name">WELCOME</h2>
                <p id="user-email"></p>
                <button class="btn-signout" id="btn-logout">Sign Out</button>
            </div>
        </div>
    </div>

    <header>
        <a href="index.html" class="brand-logo">The Egyptian King</a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop Collection</a></li>
                <li><a href="terms.html">Terms & Policies</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <button class="btn-auth" id="open-auth-btn">Sign In</button>
            <a href="cart.html" class="btn-bag">BAG (<span id="cart-count">0</span>)</a>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Full Apparel Collection</h1>
        </div>

        <div class="product-grid" id="shop-grid">
            <!-- PRODUCTS GENERATED BY JS -->
        </div>
    </main>

    <footer>
        <div class="brand-logo">THE EGYPTIAN KING</div>
        <div class="copyright">© 2026 THE EGYPTIAN KING. All rights reserved.</div>
    </footer>

    <!-- FIREBASE MODULE SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
        import { 
            getAuth, 
            GoogleAuthProvider, 
            signInWithPopup, 
            signOut, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOtDF71w3oXICE04c9CGtz_prRHBnMq6c",
            authDomain: "the-egyptian-king-68e45.firebaseapp.com",
            projectId: "the-egyptian-king-68e45",
            storageBucket: "the-egyptian-king-68e45.firebasestorage.app",
            messagingSenderId: "94881816710",
            appId: "1:94881816710:web:10fca569f1b43c583ab107",
            measurementId: "G-ZR0FBN0PRV"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // UI Auth References
        const openAuthBtn = document.getElementById('open-auth-btn');
        const closeAuthBtn = document.getElementById('close-modal-btn');
        const authModal = document.getElementById('auth-modal');
        const googleLoginBtn = document.getElementById('btn-google-login');
        const logoutBtn = document.getElementById('btn-logout');
        
        const unauthContainer = document.getElementById('auth-unauthenticated');
        const authContainer = document.getElementById('auth-authenticated');
        const userNameEl = document.getElementById('user-name');
        const userEmailEl = document.getElementById('user-email');
        const userPhotoEl = document.getElementById('user-photo');

        // Modal Controls
        openAuthBtn.addEventListener('click', () => authModal.classList.add('active'));
        closeAuthBtn.addEventListener('click', () => authModal.classList.remove('active'));
        authModal.addEventListener('click', (e) => {
            if (e.target === authModal) authModal.classList.remove('active');
        });

        // Login Handler
        googleLoginBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                authModal.classList.remove('active');
            } catch (error) {
                console.error("Authentication Error:", error);
            }
        });

        // Logout Handler
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
                authModal.classList.remove('active');
            } catch (error) {
                console.error("Sign-out Error:", error);
            }
        });

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                openAuthBtn.innerText = user.displayName ? user.displayName.split(' ')[0] : 'ACCOUNT';
                unauthContainer.style.display = 'none';
                authContainer.style.display = 'block';
                userNameEl.innerText = user.displayName || 'User';
                userEmailEl.innerText = user.email || '';
                userPhotoEl.src = user.photoURL || 'https://via.placeholder.com/60';
            } else {
                openAuthBtn.innerText = 'SIGN IN';
                unauthContainer.style.display = 'block';
                authContainer.style.display = 'none';
            }
        });
    </script>

    <!-- SHOPPING CART & SITE SCRIPT -->
    <script>
        const products = [
            { id: 1, name: "Queen Nefertiti Hoodie", price: 950, img: "https://i.postimg.cc/Y0QxV6g3/516715712-17866882896411646-829132566278910828-n.jpg" },
            { id: 2, name: "Khaby Lame Hoodie", price: 950, img: "https://i.postimg.cc/zXB9x1w5/472608428-17843821857411646-5190413624021546847-n.jpg" },
            { id: 3, name: "LeBron James Hoodie", price: 950, img: "https://i.postimg.cc/SKqdt60g/472633368-17843821560411646-1301946515224713514-n.jpg" },
            { id: 4, name: "Dwayne Johnson Hoodie", price: 950, img: "https://i.postimg.cc/zGmYvcWH/472640130-17843821824411646-6190914740358970487-n.jpg" },
            { id: 5, name: "Jude Bellingham Hoodie", price: 950, img: "https://i.postimg.cc/ydXfJtXr/470948200-17843821491411646-2530782776797434651-n.jpg" },
            { id: 6, name: "Social Media Hoodie", price: 950, img: "https://i.postimg.cc/kGWtXPxZ/472698557-17843821893411646-1529126455755902565-n.jpg" },
            { id: 7, name: "Egyptian Rulers Hoodie", price: 950, img: "https://i.postimg.cc/4NFDZGb6/472626436-17843821371411646-4896956000507693153-n.jpg" },
            { id: 8, name: "Egyptian Culture Hoodie", price: 950, img: "https://i.postimg.cc/pLSSzx93/606046002-17886492576411646-3278374060857878734-n.jpg" },
            { id: 9, name: "FIFA World Cup Hoodie", price: 980, img: "https://i.postimg.cc/qRHPBMmP/unnamed.png" },
            { id: 10, name: "Algerian Culture Hoodie", price: 950, img: "https://i.postimg.cc/3rZnLTjD/IMG-5187.png" },
            { id: 11, name: "Tunisia Culture Hoodie", price: 950, img: "https://i.postimg.cc/cCZv3NHh/IMG-5259.jpg" },
            { id: 12, name: "Rewayet El 3omr Hoodie", price: 950, img: "https://i.postimg.cc/ZKC1zyjb/Untitled-design.png" },
            { id: 13, name: "El Donya Raby3 T-Shirt", price: 550, img: "https://i.postimg.cc/J4FSGRPh/Untitled-design-(1).png" },
            { id: 14, name: "El R7la Wl Fekr T-Shirt", price: 550, img: "https://i.postimg.cc/wMGX0HkZ/Untitled-design-2.png" },
            { id: 15, name: "Zkrayat 3310 T-Shirt", price: 550, img: "https://i.postimg.cc/6qbrYRKJ/Untitled-design-(4).png" },
            { id: 16, name: "Sa7et El Syf T-Shirt", price: 550, img: "https://i.postimg.cc/XYJgrdmV/Untitled-design-(5).png" },
            { id: 17, name: "2skndereya T-Shirt", price: 550, img: "https://i.postimg.cc/RVgJBSCq/Untitled-design-(7).png" },
            { id: 18, name: "Basic Core — Black", price: 450, img: "https://i.postimg.cc/CxRFZDkV/Untitled-design-(9).png" },
            { id: 19, name: "Basic Core — Grey", price: 450, img: "https://i.postimg.cc/MH3CxPsq/Untitled-design-(10).png" },
            { id: 20, name: "Basic Core — Pink", price: 450, img: "https://i.postimg.cc/G2qNJgng/Untitled-design-(11).png" },
            { id: 21, name: "Basic Core — Blue", price: 450, img: "https://i.postimg.cc/5tJRcW4f/Untitled-design-(13).png" },
            { id: 22, name: "Basic Core — Brown", price: 450, img: "https://i.postimg.cc/ncQRChry/Untitled-design-(12).png" }
        ];

        function renderProducts() {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-img-box"><img src="${p.img}" alt="${p.name}"></div>
                    <div class="product-details">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">E£${p.price.toFixed(2)}</div>
                        <button class="btn-add" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(productId) {
            let cart = JSON.parse(localStorage.getItem('kingCart')) || [];
            const item = products.find(p => p.id === productId);
            const existing = cart.find(c => c.id === productId);

            if (existing) {
                existing.qty++;
            } else {
                cart.push({ ...item, qty: 1 });
            }

            localStorage.setItem('kingCart', JSON.stringify(cart));
            updateCartBadge();
            showToast(`" ${item.name} " ADDED TO BAG`);
        }

        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('kingCart')) || [];
            const totalCount = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = totalCount;
        }

        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('show');
            
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2800);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartBadge();
            const savedTheme = localStorage.getItem('selectedTheme') || 'neon';
            if (savedTheme !== 'basic') {
                document.body.setAttribute('data-theme', savedTheme);
            }
        });
    </script>
</body>
</html>
